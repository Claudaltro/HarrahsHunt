<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Harrah's Gulf Coast Egg Hunt 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial Black', sans-serif; background: #000; overflow: hidden; height: 100vh; }
        
        /* CAMERA */
        #camera-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        /* BORDER */
        #screen-border { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: 0px solid transparent; z-index: 10; pointer-events: none; transition: all 0.5s; box-sizing: border-box; }
        
        /* STATUS */
        #ui-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); width: 88%; text-align: center; z-index: 20; }
        .badge { padding: 16px 20px; border-radius: 16px; color: white; font-weight: bold; font-size: 1.05em; background: rgba(75,0,130,0.92); border: 2px solid #FFD700; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        
        /* 3D EGG (Purple with Golden Halo) */
        #egg-3d { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -55%); z-index: 15; text-align: center; animation: floatEgg 2.5s ease-in-out infinite alternate; }
        .egg-shell { width: 130px; height: 170px; background: radial-gradient(circle at 38% 35%, #9B30CC, #4B0082 55%, #2a0050); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: 0 0 40px 15px rgba(255,165,0,0.7), inset -15px -20px 30px rgba(0,0,0,0.4), inset 8px 8px 20px rgba(180,100,255,0.4); position: relative; margin: 0 auto; }
        
        /* GOLDEN HALO (Moving like Pokemon GO) */
        .golden-halo { position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px; border: 4px solid #FFD700; border-radius: 50%; opacity: 0.6; animation: haloMove 2s linear infinite; }
        @keyframes haloMove { 0% { transform: scale(0.8) rotateX(70deg); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: scale(1.4) rotateX(70deg); opacity: 0; } }
        
        @keyframes floatEgg { from { transform: translate(-50%, -55%); } to { transform: translate(-50%, -65%); } }
        
        .egg-label { margin-top: 12px; background: rgba(255,215,0,0.9); color: #4B0082; padding: 8px 16px; border-radius: 10px; font-weight: bold; font-size: 0.9em; animation: pulse 1s ease-in-out infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
        
        /* VICTORY SCREENS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: white; padding: 30px; border-radius: 25px; width: 85%; text-align: center; z-index: 40; border: 5px solid #FFD700; box-shadow: 0 0 40px rgba(255,215,0,0.6); }
        .modal h2 { color: #4B0082; margin-bottom: 8px; font-size: 1.5em; }
        .modal p { color: #555; font-size: 0.95em; margin-bottom: 15px; }
        input[type="text"] { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #4B0082; border-radius: 8px; font-size: 1em; }
        .action-btn { background: #4B0082; color: #FFD700; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 12px; font-size: 1.1em; margin-top: 12px; }
        
        /* PHOTO BUTTON */
        #photo-btn { display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #FFD700; color: #4B0082; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 30; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* START SCREEN */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a0033; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center; padding: 30px; }
        #start-btn { background: #FFD700; color: #4B0082; border: none; padding: 18px 40px; border-radius: 16px; font-size: 1.2em; font-weight: bold; margin-top: 24px; }
        
        /* COUNTDOWN */
        #countdown { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,0,51,0.95); z-index: 60; color: #FFD700; font-size: 130px; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <video id="camera-view" autoplay playsinline></video>
    <div id="screen-border"></div>
    
    <div id="ui-container">
        <div class="badge">
            <span id="status-text">📡 CONNECTING...</span>
        </div>
    </div>

    <div id="egg-3d">
        <div class="golden-halo"></div>
        <div class="egg-shell">
            <div class="egg-shine"></div>
            <div class="egg-glow"></div>
        </div>
        <div class="egg-label">✨ PURPLE EGG FOUND! ✨</div>
    </div>

    <button id="photo-btn" onclick="takeScreenshot()">📸 TAKE PHOTO & WIN!</button>

    <!-- Modal 1: Initial Victory -->
    <div id="victory-modal" class="modal">
        <h2>CONGRATULATIONS!</h2>
        <p>You found the Purple Egg!</p>
        <button class="action-btn" onclick="showClaimForm()">NEXT</button>
    </div>

    <!-- Modal 2: Claim Form -->
    <div id="claim-modal" class="modal">
        <h2>REDEEM YOUR PRIZE</h2>
        <p>Enter your name and visit the <b>SportsBook Counter</b> to claim your prize!</p>
        <input type="text" id="player-name" placeholder="YOUR FULL NAME">
        <button id="save-btn" class="action-btn" onclick="claimPrize()">CLAIM PRIZE!</button>
    </div>

    <div id="start-screen">
        <h1 style="color:#FFD700; font-size: 2.5em;">Harrah's Egg Hunt</h1>
        <p style="color:white; margin-top:10px;">Find the Purple Egg in Augmented Reality!</p>
        <button id="start-btn" onclick="startHunt()">START HUNT</button>
    </div>

    <div id="countdown">3</div>

    <script>
        // CONFIGURATION
        const target = { lat: 30.39318, lon: -88.97833 }; // Harrah's Gulf Coast
        const TEST_MODE = true; 
        const APPEARANCE_TIME = 8000; // 8 seconds before buttons appear
        
        let eggVisible = false;
        let canInteract = false;

        function getDistFeet(lat1, lon1, lat2, lon2) {
            const R = 20925525; 
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
        }

        function startHunt() {
            document.getElementById('start-screen').style.display = 'none';
            const cd = document.getElementById('countdown');
            cd.style.display = 'flex';
            let count = 3;
            const itv = setInterval(() => {
                count--;
                cd.innerHTML = count > 0 ? count : 'GO!';
                if (count < 0) {
                    clearInterval(itv);
                    cd.style.display = 'none';
                    initSystems();
                }
            }, 1000);
        }

        function initSystems() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(s => { document.getElementById('camera-view').srcObject = s; })
                .catch(e => console.error(e));

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(onPos, null, { enableHighAccuracy: true });
            }
        }

        function onPos(pos) {
            const dist = getDistFeet(pos.coords.latitude, pos.coords.longitude, target.lat, target.lon);
            const st = document.getElementById('status-text');
            const br = document.getElementById('screen-border');
            
            if (dist > 65) {
                st.innerHTML = '❄️ COLD... ' + dist + ' ft';
                st.parentElement.style.background = 'rgba(0,0,200,0.9)';
                br.style.border = '12px solid #3399FF';
                showEgg(false);
            } else if (dist > 20) {
                st.innerHTML = '🔥 WARMING UP! ' + dist + ' ft';
                st.parentElement.style.background = 'rgba(255,140,0,0.9)';
                br.style.border = '18px solid orange';
                showEgg(false);
            } else {
                st.innerHTML = '🌋 HOT! LOOK AROUND!';
                st.parentElement.style.background = 'rgba(200,0,0,0.9)';
                br.style.border = '28px solid red';
                showEgg(true);
            }
        }

        function showEgg(show) {
            const egg = document.getElementById('egg-3d');
            if (show && !eggVisible) {
                eggVisible = true;
                egg.style.display = 'block';
                
                // Wait 8 seconds before showing photo button
                setTimeout(() => {
                    document.getElementById('photo-btn').style.display = 'block';
                }, APPEARANCE_TIME);
            } else if (!show && eggVisible) {
                eggVisible = false;
                egg.style.display = 'none';
                document.getElementById('photo-btn').style.display = 'none';
            }
        }

        function takeScreenshot() {
            // In a real app, this would use canvas to merge video + egg
            // For the prototype, we simulate the "capture" feel
            document.getElementById('photo-btn').style.display = 'none';
            
            // Show Victory after 3 seconds of "photo" processing
            setTimeout(() => {
                document.getElementById('victory-modal').style.display = 'block';
            }, 1000);
        }

        function showClaimForm() {
            document.getElementById('victory-modal').style.display = 'none';
            document.getElementById('claim-modal').style.display = 'block';
        }

        function claimPrize() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Please enter your full name!');
            
            // Send to Google Sheets (Simulated for now, can use fetch to a GAS endpoint)
            const data = {
                name: name,
                egg_id: 1,
                location: 'Harrah\'s Gulf Coast',
                timestamp: new Date().toISOString()
            };
            
            // Email redundancy
            const mailLink = `mailto:cdaltro@gmail.com?subject=Egg Found!&body=Winner: ${name}%0ALocation: ${data.location}%0ATime: ${data.timestamp}`;
            
            alert('SUCCESS! Go to the SportsBook Counter now.');
            window.location.href = mailLink;
        }
    </script>
</body>
</html>
