<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Harrah's Golden Egg Hunt 2026</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
    #screen-border {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-width: 0px; border-style: solid; box-sizing: border-box;
      z-index: 50; pointer-events: none; transition: all 0.5s ease;
    }
    #ui-container {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      width: 85%; text-align: center; z-index: 100;
    }
    .badge {
      padding: 15px; border-radius: 15px; color: white; font-weight: bold;
      background: rgba(75, 0, 130, 0.9); border: 2px solid #FFD700;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #victory-screen {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: white;
      padding: 30px; border-radius: 25px; width: 80%; text-align: center;
      z-index: 200; border: 5px solid #FFD700;
    }
    #save-btn {
      background: #4B0082; color: #FFD700; border: none; padding: 18px;
      width: 100%; font-weight: bold; border-radius: 12px; font-size: 1.2em;
      margin-top: 15px; cursor: pointer; animation: pulse 1s infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); } to { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="screen-border"></div>
  <audio id="sparkle-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
  <div id="ui-container">
    <div id="status-text" class="badge">INITIALIZING GPS SIGNAL...</div>
  </div>
  <div id="victory-screen">
    <h2 style="color:#4B0082; margin:0;">EGG DISCOVERED!</h2>
    <p style="color:#666; font-size:12px; margin:10px 0;">Happy Easter Harrah's! Go to the Casino Kiosk to claim your prize!</p>
    <input type="text" id="player-name" placeholder="ENTER YOUR FULL NAME" style="width:90%; padding:12px; margin:10px 0; border:2px solid #4B0082; border-radius:8px;">
    <button id="save-btn" onclick="captureExperience()">SAVE PHOTO & CLAIM</button>
  </div>
  <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: camera; debugUIEnabled: false;">
    <a-entity id="golden-egg" gps-entity-place="latitude: 0; longitude: 0;" visible="false">
      <a-sphere radius="15" material="color: #FFD700; metalness: 1; roughness: 0.1; emissive: #FFA500; emissiveIntensity: 0.7"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-sphere>
      <a-text id="floating-name" value="" align="center" position="0 20 0" scale="25 25 25" color="#4B0082"></a-text>
    </a-entity>
    <a-entity camera gps-camera rotation-reader></a-entity>
  </a-scene>
  <script>
    const huntSchedule = [
      {lat: 30.39318, lon: -88.97833},
      {lat: 30.3932,  lon: -88.8828},
      {lat: 30.3935,  lon: -88.8830},
      {lat: 30.3938,  lon: -88.8832},
      {lat: 30.3941,  lon: -88.8835},
      {lat: 30.3944,  lon: -88.8838},
      {lat: 30.3947,  lon: -88.8840},
      {lat: 30.3950,  lon: -88.8842},
      {lat: 30.3953,  lon: -88.8845},
      {lat: 30.3956,  lon: -88.8848}
    ];
    const status = document.getElementById('status-text');
    const border = document.getElementById('screen-border');
    const eggContainer = document.getElementById('golden-egg');
    const sound = document.getElementById('sparkle-sound');
    const hourIndex = 0; // TESTE - posicao fixa
    if (hourIndex < 0) hourIndex = 0;
    if (hourIndex > 9) hourIndex = 9;
    const target = huntSchedule[hourIndex];
    eggContainer.setAttribute('gps-entity-place', 'latitude: ' + target.lat + '; longitude: ' + target.lon + ';');
    window.addEventListener('gps-entity-place-update-positon', (e) => {
      const distance = e.detail.distance;
      if (distance > 20) {
        status.innerHTML = 'COLD... KEEP WALKING';
        status.style.background = '#0000FF';
        border.style.border = '15px solid blue';
      } else if (distance > 12) {
        status.innerHTML = 'GETTING WARMER!';
        status.style.background = '#FFA500';
        border.style.border = '20px solid orange';
      } else if (distance > 1) {
        status.innerHTML = "IT'S SCORCHING HOT!";
        status.style.background = '#FF0000';
        border.style.border = '30px solid red';
      } else {
        status.innerHTML = 'GOLDEN EGG DISCOVERED!';
        status.style.background = '#FFD700';
        status.style.color = '#4B0082';
        border.style.border = '40px solid #FFD700';
        eggContainer.setAttribute('visible', 'true');
        if (sound.paused) sound.play();
        document.getElementById('victory-screen').style.display = 'block';
      }
    });
    function captureExperience() {
      const name = document.getElementById('player-name').value;
      if (!name) return alert('Please enter your name to claim your prize!');
      document.getElementById('floating-name').setAttribute('value', name);
      document.getElementById('victory-screen').style.display = 'none';
      html2canvas(document.body).then(canvas => {
        const img = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'Harrahs-Easter-Winner.png';
        link.href = img;
        link.click();
        alert('PHOTO SAVED! Show this to the Casino Kiosk to claim your prize! Happy Easter!');
        location.reload();
      });
    }
  </script>
</body>
</html>
