<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Harrah's Golden Egg Hunt 2026</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; background: #000; }
    #screen-border { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: 0px solid transparent; z-index: 10; pointer-events: none; transition: all 0.5s ease; box-sizing: border-box; }
    #ui-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); width: 88%; text-align: center; z-index: 20; }
    .badge { padding: 16px 20px; border-radius: 16px; color: white; font-weight: bold; font-size: 1em; background: rgba(75,0,130,0.92); border: 2px solid #FFD700; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    #victory-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 25px; width: 82%; text-align: center; z-index: 100; border: 5px solid #FFD700; }
    #victory-screen h2 { color: #4B0082; margin-bottom: 8px; }
    #player-name { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #4B0082; border-radius: 8px; }
    #save-btn { background: #4B0082; color: #FFD700; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 12px; margin-top: 12px; }
    #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a0033; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; padding: 30px; }
    #start-btn { background: #FFD700; color: #4B0082; border: none; padding: 18px 40px; border-radius: 16px; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
    #countdown { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,0,51,0.95); z-index: 300; color: #FFD700; font-size: 120px; align-items: center; justify-content: center; font-weight: bold; }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">
  <div id="start-screen">
    <div style="font-size: 80px;">🥚</div>
    <h1 style="color: #FFD700;">Harrah's Golden Egg Hunt</h1>
    <p style="color: #ddd; margin-top: 10px;">Find the 3D Golden Egg in Augmented Reality!</p>
    <button id="start-btn" onclick="startHunt()">🔍 START HUNT</button>
  </div>

  <div id="countdown">3</div>
  <div id="screen-border"></div>
  <div id="ui-container"><div id="status-text" class="badge">📡 Connecting...</div></div>

  <div id="victory-screen">
    <h2>🥚 EGG DISCOVERED!</h2>
    <p>You found it! Enter your name to claim your treasure at the Kiosk.</p>
    <input type="text" id="player-name" placeholder="ENTER YOUR FULL NAME">
    <button id="save-btn" onclick="claimPrize()">🏆 CLAIM PRIZE</button>
  </div>

  <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: camera; debugUIEnabled: false;">
    <a-entity id="egg-entity" gps-entity-place="latitude: 30.39318; longitude: -88.97833;" visible="false" scale="40 40 40">
      <a-sphere material="color: #4B0082; metalness: 1; roughness: 0.1; emissive: #7B00CC; emissiveIntensity: 0.6"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-sphere>
    </a-entity>
    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>

  <script>
    const target = {lat: 30.39318, lon: -88.97833};

    function startHunt() {
      document.getElementById('start-screen').style.display = 'none';
      const cd = document.getElementById('countdown');
      cd.style.display = 'flex';
      let count = 3;
      const itv = setInterval(() => {
        count--;
        cd.innerHTML = count > 0 ? count : 'GO!';
        if(count < 0) {
          clearInterval(itv);
          cd.style.display = 'none';
          initGPS();
        }
      }, 1000);
    }

    function initGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
          const R = 20925525; // FEET
          const lat1 = pos.coords.latitude * Math.PI/180;
          const lat2 = target.lat * Math.PI/180;
          const dLat = (target.lat - pos.coords.latitude) * Math.PI/180;
          const dLon = (target.lon - pos.coords.longitude) * Math.PI/180;
          const a = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
          const distFeet = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

          const st = document.getElementById('status-text');
          const br = document.getElementById('screen-border');
          const egg = document.getElementById('egg-entity');

          if (distFeet > 65) {
            st.innerHTML = '❄️ COLD... ' + distFeet + ' ft away';
            st.style.background = 'rgba(0,0,200,0.9)'; br.style.border = '12px solid blue';
            egg.setAttribute('visible', 'false');
          } else if (distFeet > 20) {
            st.innerHTML = '🌡️ WARMER! ' + distFeet + ' ft';
            st.style.background = 'rgba(255,140,0,0.9)'; br.style.border = '18px solid orange';
            egg.setAttribute('visible', 'false');
          } else {
            st.innerHTML = '🔥 HOT! ' + distFeet + ' ft! LOOK AROUND!';
            st.style.background = 'rgba(200,0,0,0.9)'; br.style.border = '28px solid red';
            egg.setAttribute('visible', 'true');
            if (distFeet <= 5) {
              document.getElementById('victory-screen').style.display = 'block';
            }
          }
        }, null, {enableHighAccuracy:true});
      }
    }

    function claimPrize() {
      const n = document.getElementById('player-name').value.trim();
      if(!n) return alert('Enter your name!');
      alert('Congrats ' + n.toUpperCase() + '! Show this at the Kiosk!');
      location.reload();
    }
  </script>
</body>
</html>
