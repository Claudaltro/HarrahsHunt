<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Harrah's Gulf Coast Egg Hunt 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial Black', sans-serif; background: #000; overflow: hidden; height: 100vh; }
        #camera-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #ui-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; z-index: 20; }
        .badge { padding: 12px; border-radius: 12px; color: white; font-weight: bold; font-size: 0.9em; background: rgba(75,0,130,0.85); border: 2px solid #FFD700; transition: background 0.5s; }
        
        /* PREMIUM 3D EGG VISUALS */
        #egg-container { display: none; position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 15; text-align: center; }
        #egg-3d { filter: drop-shadow(0 0 50px rgba(255,215,0,0.8)); animation: floatEgg 3s ease-in-out infinite alternate; }
        .egg-shell { width: 210px; height: 290px; background: radial-gradient(circle at 30% 30%, #FFFFFF, #E1BEE7 15%, #9B30CC 40%, #4B0082 70%, #1a0033); border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%; box-shadow: inset -30px -40px 60px rgba(0,0,0,0.8), inset 25px 25px 45px rgba(255,255,255,0.6), 0 0 70px rgba(155,48,204,0.5); position: relative; margin: 0 auto; }
        .golden-halo { position: absolute; top: -55px; left: -55px; right: -55px; bottom: -55px; border: 7px solid #FFD700; border-radius: 50%; opacity: 0.6; animation: haloMove 1.8s linear infinite; }
        @keyframes haloMove { 0% { transform: scale(0.8) rotateX(75deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.8) rotateX(75deg); opacity: 0; } }
        @keyframes floatEgg { from { transform: translateY(0); } to { transform: translateY(-30px); } }

        /* MODALS */
        .modal { display: none; position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 25px; width: 92%; text-align: center; z-index: 40; border: 4px solid #FFD700; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .modal h2 { color: #4B0082; font-size: 1.4em; margin-bottom: 8px; }
        .modal p { color: #333; font-size: 0.95em; margin-bottom: 15px; }
        .action-btn { background: #4B0082; color: #FFD700; border: none; padding: 18px; width: 100%; font-weight: bold; border-radius: 15px; font-size: 1.1em; margin-top: 10px; cursor: pointer; }
        #screenshot-btn { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: #FFD700; color: #4B0082; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 30; display: none; border: 3px solid #4B0082; }
        input[type="text"] { width: 100%; padding: 15px; margin: 5px 0; border: 3px solid #4B0082; border-radius: 12px; font-size: 1.1em; text-align: center; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a0033; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; padding: 30px; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>Harrah's Gulf Coast</h1>
    <h2>AR EGG HUNT 2026</h2>
    <p style="margin: 20px 0;">Find the 10 hidden eggs around the casino to win prizes!</p>
    <button class="action-btn" onclick="startHunt()">START SEARCH</button>
</div>

<div id="ui-container">
    <div id="status-badge" class="badge">
        <span id="status-text">📡 CONNECTING...</span>
    </div>
</div>

<video id="camera-view" autoplay playsinline></video>

<div id="egg-container">
    <div id="egg-3d">
        <div class="egg-shell">
            <div class="golden-halo"></div>
        </div>
    </div>
</div>

<button id="screenshot-btn" onclick="takeScreenshot()">📸 TAKE A SCREENSHOT</button>

<div id="victory-modal" class="modal">
    <h2>✨ CONGRATULATIONS! ✨</h2>
    <p>You found the Egg! Keep it on screen and take a photo!</p>
</div>

<div id="claim-modal" class="modal">
    <h2>CLAIM YOUR PRIZE</h2>
    <p>Enter your name and head to the <b>SportsBook Counter</b> to redeem!</p>
    <input type="text" id="player-name" placeholder="Enter Full Name">
    <button class="action-btn" onclick="finalizeClaim()">CLAIM PRIZE!</button>
</div>

<script>
// GOOGLE SHEETS CONFIG
const GOOGLE_SHEET_URL = "YOUR_APPS_SCRIPT_URL_HERE";

// EGG LOCATIONS (10 Employee, 10 Guest)
const EGGS = [
    { id: "test_1", lat: 30.39318, lon: -88.97833, loc: "Hotel Lobby", type: "test" },
    { id: "emp_1", lat: 30.39350, lon: -88.97800, loc: "Employee Lounge", type: "employee" },
    { id: "emp_2", lat: 30.39360, lon: -88.97810, loc: "Back Office Area", type: "employee" },
    { id: "guest_1", lat: 30.39400, lon: -88.97750, loc: "SportsBook Stand", type: "guest" },
    { id: "guest_2", lat: 30.39410, lon: -88.97760, loc: "Casino Floor North", type: "guest" }
];

let currentEgg = null;
let eggVisible = false;

function getDistFeet(lat1, lon1, lat2, lon2) {
    const R = 20925525; // Earth radius in feet
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function startHunt() {
    document.getElementById('start-screen').style.display = 'none';
    initCamera();
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(onPos, onGeoError, { enableHighAccuracy: true });
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

function onGeoError(error) {
    console.error(error);
    alert("Location access is required for the hunt. Please enable GPS and allow permissions.");
}

function initCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { document.getElementById('camera-view').srcObject = s; })
        .catch(e => {
            console.error(e);
            alert("Camera access is required for AR. Please enable camera permissions.");
        });
}

function onPos(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    let foundNearby = false;

    for (const egg of EGGS) {
        const dist = getDistFeet(lat, lon, egg.lat, egg.lon);
        if (dist <= 15) {
            if (localStorage.getItem(egg.id + "_claimed")) continue;
            currentEgg = egg;
            foundNearby = true;
            showEgg(true);
            document.getElementById('status-text').innerHTML = '🌋 YOU ARE ON IT! LOOK AROUND!';
            document.getElementById('status-badge').style.background = 'rgba(200,0,0,0.85)';
            break;
        }
    }

    if (!foundNearby) {
        currentEgg = null;
        showEgg(false);
        document.getElementById('status-text').innerHTML = '🔍 SEARCHING FOR EGGS...';
        document.getElementById('status-badge').style.background = 'rgba(75,0,130,0.85)';
    }
}

function showEgg(show) {
    const eggCont = document.getElementById('egg-container');
    const screenBtn = document.getElementById('screenshot-btn');
    if (show && !eggVisible) {
        eggVisible = true;
        eggCont.style.display = 'block';
        
        // Wait 4 seconds for egg viewing before showing Victory UI
        setTimeout(() => {
            if (eggVisible) {
                document.getElementById('victory-modal').style.display = 'block';
                screenBtn.style.display = 'block';
                
                // Wait 4 more seconds then show claim form
                setTimeout(() => {
                    if (eggVisible) {
                        document.getElementById('victory-modal').style.display = 'none';
                        document.getElementById('claim-modal').style.display = 'block';
                    }
                }, 4000);
            }
        }, 4000);
    } else if (!show && eggVisible) {
        eggVisible = false;
        eggCont.style.display = 'none';
        screenBtn.style.display = 'none';
        document.getElementById('victory-modal').style.display = 'none';
        document.getElementById('claim-modal').style.display = 'none';
    }
}

function takeScreenshot() {
    alert("Moment captured! Make sure to save the photo to your gallery.");
}

function finalizeClaim() {
    const name = document.getElementById('player-name').value.trim();
    if (!name) return alert('Please enter your full name!');

    localStorage.setItem(currentEgg.id + "_claimed", "true");

    const data = {
        egg_id: currentEgg.id,
        location: currentEgg.loc,
        winner: name,
        time: new Date().toLocaleString()
    };

    if (GOOGLE_SHEET_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
        fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    }

    const subject = encodeURIComponent(`Egg Found: ${currentEgg.loc}`);
    const body = encodeURIComponent(`Winner: ${name}\nLocation: ${currentEgg.loc}\nTime: ${data.time}`);
    
    alert('Claim submitted! Click OK to open your email and send the confirmation.');
    window.location.href = `mailto:cdaltro@gmail.com?subject=${subject}&body=${body}`;

    setTimeout(() => { location.reload(); }, 3000);
}
</script>
</body>
</html>
